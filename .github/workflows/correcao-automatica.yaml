name: Avaliador Automático (Gemini)

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Necessário para comentar no PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pega todo o histórico para analisar commits

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: pip install google-genai PyGithub requests

      - name: Executar Avaliação do Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GEMINI_PROMPT: ${{ secrets.GEMINI_PROMPT }}
        run: python .github/scripts/avaliador.py